<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grand Minaro — Meta Ads Intelligence</title>
<meta name="ext-resource-dependency" content="assets/gm-monogram.png" data-resource-id="monogram" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg-0:#04101a; --bg-1:#0a1c29; --bg-2:#0f2837; --bg-3:#143041;
  --line:rgba(255,255,255,.075); --line-2:rgba(255,255,255,.12);
  --ink:#e9f0f3; --ink-dim:#94a9b6; --ink-faint:#5e7686;
  --gold:#CF8A00; --gold-bright:#E8AE3C;
  --green:#1A5632; --emerald:#36b277;
  /* category tones */
  --c-rooms:#34a877; --c-couple:#d99b1c; --c-wedding:#4f9dd6; --c-other:#7c8fa0;
  /* accent (default: gold) */
  --accent:#CF8A00; --accent-bright:#E8AE3C;
  --accent-soft:rgba(207,138,0,.13); --accent-line:rgba(207,138,0,.30); --accent-ink:#0a0a07;
  --radius:18px; --radius-sm:12px;
  --panel:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.008));
  --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -24px rgba(0,0,0,.8);
  --maxw:1240px;
}
body.accent-green{
  --accent:#1f9d57; --accent-bright:#3fce86;
  --accent-soft:rgba(31,157,87,.15); --accent-line:rgba(31,157,87,.32); --accent-ink:#04130b;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-0); color:var(--ink);
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1100px 520px at 78% -8%, var(--accent-soft), transparent 60%),
    radial-gradient(900px 480px at -6% 4%, rgba(26,86,50,.16), transparent 55%);
  background-attachment:fixed;
}
::selection{background:var(--accent);color:var(--accent-ink);}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums;}
.serif{font-family:"Marcellus",serif;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{height:9px;width:9px;}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(4,16,26,.82);
  backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line);}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:18px;height:70px;}
.brand{display:flex;align-items:center;gap:13px;}
.mono-mark{height:46px;width:auto;display:block;filter:drop-shadow(0 4px 14px rgba(207,138,0,.18));}
.brand-divider{width:1px;height:34px;background:linear-gradient(180deg,transparent,var(--accent-line),transparent);margin:0 3px;}
.wm-name{font-family:"Marcellus",serif;font-size:19px;letter-spacing:.16em;color:var(--ink);line-height:1;}
.wm-sub{display:flex;align-items:center;gap:8px;margin-top:5px;}
.wm-tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap;}
.wm-sub{flex-wrap:nowrap;}
.live-tag{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--emerald);background:rgba(54,178,119,.12);border:1px solid rgba(54,178,119,.28);
  padding:2px 7px;border-radius:6px;font-weight:700;white-space:nowrap;}
.top-actions{display:flex;align-items:center;gap:11px;}
.status-chip{display:flex;align-items:center;gap:9px;background:var(--bg-1);border:1px solid var(--line);
  border-radius:11px;padding:7px 12px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 3px rgba(54,178,119,.18);}
.dot.pulse{animation:pulse 2.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.dot.warn{background:var(--gold-bright);box-shadow:0 0 0 3px rgba(232,174,60,.18);}
.dot.err{background:#e3756b;box-shadow:0 0 0 3px rgba(227,117,107,.18);}
.icon-btn.spinning{color:var(--accent-bright);border-color:var(--accent-line);}
.icon-btn.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.status-chip .s-main{font-size:11px;font-weight:700;color:var(--ink);line-height:1.1;}
.status-chip .s-sub{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--ink-faint);font-weight:600;white-space:nowrap;}
.icon-btn{width:38px;height:38px;display:grid;place-items:center;background:var(--bg-1);
  border:1px solid var(--line);border-radius:11px;color:var(--ink-dim);transition:.18s;}
.icon-btn:hover{color:var(--accent-bright);border-color:var(--accent-line);background:var(--bg-2);}
.src-btn{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--accent-ink);
  background:var(--accent);border:1px solid var(--accent-bright);border-radius:11px;padding:9px 15px;transition:.18s;}
.src-btn:hover{background:var(--accent-bright);box-shadow:0 8px 22px -10px var(--accent);}

/* ---------- hero ---------- */
.hero{padding:38px 0 14px;}
.hero-eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--accent-bright);font-weight:600;margin-bottom:14px;}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:30px;flex-wrap:wrap;}
.hero-title{font-family:"Marcellus",serif;font-size:clamp(30px,4.4vw,50px);line-height:1.02;letter-spacing:.01em;
  color:var(--ink);margin:0;max-width:14ch;}
.hero-title em{font-style:normal;color:var(--accent-bright);}
.hero-sub{color:var(--ink-dim);font-size:14.5px;margin-top:16px;max-width:54ch;line-height:1.6;}
.hero-stat{text-align:right;}
.hero-stat .hs-label{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-faint);font-weight:600;}
.hero-stat .hs-val{font-family:"Marcellus",serif;font-size:clamp(32px,4.2vw,48px);line-height:1;color:var(--ink);margin-top:8px;white-space:nowrap;}
.hero-stat .hs-val .pfx{color:var(--ink-faint);font-size:.42em;letter-spacing:.04em;margin-right:.32em;vertical-align:.16em;}
.hero-stat .hs-meta{font-size:12.5px;color:var(--ink-dim);margin-top:9px;}

/* ---------- period filter ---------- */
.period-bar{display:flex;align-items:center;gap:14px;margin:26px 0 4px;flex-wrap:wrap;}
.period-lbl{display:flex;align-items:center;gap:8px;font-family:"JetBrains Mono",monospace;font-size:10.5px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap;}
.period-lbl::before{content:"";width:22px;height:1px;background:var(--line-2);}
.pills{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
.pill{font-size:12px;font-weight:700;padding:8px 13px;border-radius:10px;color:var(--ink-dim);
  background:var(--bg-1);border:1px solid var(--line);transition:.16s;white-space:nowrap;}
.pill:hover{color:var(--ink);border-color:var(--line-2);background:var(--bg-2);}
.pill.active{color:var(--accent-ink);background:var(--accent);border-color:var(--accent-bright);
  box-shadow:0 8px 20px -12px var(--accent);}
.pill.all{font-family:"JetBrains Mono",monospace;letter-spacing:.06em;}

/* ---------- generic panel ---------- */
.panel{background:var(--bg-1);background-image:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);position:relative;}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
  padding:20px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.panel-title{font-family:"Marcellus",serif;font-size:18px;letter-spacing:.02em;color:var(--ink);margin:0;
  display:flex;align-items:center;gap:10px;}
.panel-title .tick{width:7px;height:18px;border-radius:3px;background:var(--accent);display:inline-block;}
.panel-sub{font-size:12px;color:var(--ink-faint);margin-top:5px;font-weight:500;}

/* ---------- KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px;}
.kpi-card{background:var(--bg-1);background-image:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:18px 19px 16px;box-shadow:var(--shadow);transition:.22s;
  display:flex;flex-direction:column;justify-content:space-between;min-height:158px;overflow:hidden;position:relative;}
.kpi-card::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;
  background:linear-gradient(90deg,var(--kpi-tone),transparent 70%);opacity:.65;}
.kpi-card:hover{border-color:var(--line-2);transform:translateY(-2px);}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;}
.kpi-label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;}
.kpi-value{font-size:27px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin-top:9px;line-height:1;}
.kpi-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--kpi-tone) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--kpi-tone) 30%,transparent);color:var(--kpi-tone);}
.kpi-bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:14px;}
.kpi-sub{font-size:12px;font-weight:700;color:var(--kpi-tone);}
.kpi-sub small{display:block;color:var(--ink-faint);font-weight:600;font-size:10.5px;margin-top:2px;}
.badge-warn{position:absolute;top:14px;right:58px;font-size:8.5px;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gold-bright);background:rgba(232,174,60,.12);
  border:1px solid rgba(232,174,60,.3);padding:3px 7px;border-radius:20px;}

.trend-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  font-family:"JetBrains Mono",monospace;}
.trend-chip .trend-arrow{font-size:8px;}
.trend-chip.chip-up{color:var(--emerald);} .trend-chip.chip-down{color:#e3756b;}
.trend-lbl{color:var(--ink-faint);font-weight:600;font-size:10px;margin-left:1px;}

/* ---------- layout sections ---------- */
.section{margin-top:18px;}
.split{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-top:16px;}

/* ---------- chart ---------- */
.sel{font-size:12px;font-weight:600;color:var(--ink);background:var(--bg-2);border:1px solid var(--line);
  border-radius:9px;padding:7px 10px;outline:none;cursor:pointer;}
.sel:focus{border-color:var(--accent-line);}
.field-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;margin-bottom:5px;display:block;}
.chart-host{position:relative;height:340px;width:100%;padding:14px 6px 0;}
.tip{position:absolute;z-index:30;pointer-events:none;background:rgba(8,22,32,.97);
  border:1px solid var(--line-2);border-radius:12px;padding:11px 13px;min-width:172px;
  box-shadow:0 20px 40px -16px rgba(0,0,0,.85);}
.tip-h{font-weight:700;font-size:12px;color:var(--ink);padding-bottom:7px;margin-bottom:7px;
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;}
.tip-h .daychip{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.1em;color:var(--accent-bright);
  background:var(--accent-soft);padding:2px 6px;border-radius:5px;}
.tip-row{display:flex;justify-content:space-between;gap:18px;font-size:11.5px;margin:3px 0;}
.tip-row .k{color:var(--ink-dim);} .tip-row .v{font-family:"JetBrains Mono",monospace;font-weight:700;white-space:nowrap;}
.tip-foot{border-top:1px solid var(--line);margin-top:7px;padding-top:6px;display:grid;
  grid-template-columns:1fr 1fr;gap:2px 12px;font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--ink-faint);}

/* ---------- donut / category ---------- */
.cat-legend{display:flex;flex-direction:column;gap:11px;}
.cat-row{display:flex;align-items:center;gap:12px;}
.cat-row .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.cat-row .cn{font-weight:700;font-size:13px;color:var(--ink);flex:1;}
.cat-row .cv{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;color:var(--ink);}
.cat-row .cc{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-faint);white-space:nowrap;}
.cat-row>div{min-width:74px;}

/* ---------- insights ---------- */
.finding{display:flex;gap:11px;padding:13px 14px;border-radius:13px;border:1px solid var(--line);background:var(--bg-2);}
.finding .fi{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;font-size:13px;}
.finding.f-alert{border-color:rgba(227,117,107,.28);background:rgba(227,117,107,.07);}
.finding.f-alert .fi{background:rgba(227,117,107,.14);color:#e3756b;}
.finding.f-success{border-color:rgba(54,178,119,.26);background:rgba(54,178,119,.07);}
.finding.f-success .fi{background:rgba(54,178,119,.14);color:var(--emerald);}
.finding.f-tip{border-color:var(--accent-line);background:var(--accent-soft);}
.finding.f-tip .fi{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent-bright);}
.finding .ft{font-weight:700;font-size:12.5px;color:var(--ink);margin:0;}
.finding .fd{font-size:11.5px;color:var(--ink-dim);margin-top:4px;line-height:1.5;}

/* ---------- planner ---------- */
.strat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.strat-btn{font-size:11.5px;font-weight:700;color:var(--ink-dim);background:var(--bg-2);border:1px solid var(--line);
  border-radius:10px;padding:10px 8px;transition:.15s;text-align:center;}
.strat-btn:hover{color:var(--ink);border-color:var(--line-2);}
.strat-btn.active{color:var(--accent-ink);background:var(--accent);border-color:var(--accent-bright);}
.range{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:6px;
  background:var(--bg-3);outline:none;margin:9px 0;}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:var(--accent-bright);border:3px solid var(--bg-1);box-shadow:0 0 0 1px var(--accent),0 4px 10px -2px var(--accent);cursor:pointer;}
.range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent-bright);border:3px solid var(--bg-1);cursor:pointer;}
.sim-out{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:16px;}

/* ---------- table ---------- */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.search{position:relative;}
.search input{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--bg-2);border:1px solid var(--line);
  border-radius:11px;padding:9px 12px 9px 34px;width:260px;outline:none;transition:.16s;}
.search input::placeholder{color:var(--ink-faint);}
.search input:focus{border-color:var(--accent-line);width:280px;}
.search .si{position:absolute;left:12px;top:9px;color:var(--ink-faint);}
.fpill{font-size:11.5px;font-weight:700;padding:7px 11px;border-radius:9px;color:var(--ink-dim);
  background:var(--bg-2);border:1px solid var(--line);transition:.15s;display:inline-flex;align-items:center;gap:7px;}
.fpill:hover{color:var(--ink);border-color:var(--line-2);}
.fpill.active{color:#fff;border-color:transparent;}
.fpill .ct{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:20px;background:rgba(255,255,255,.16);}
.tbl-scroll{overflow-x:auto;border-top:1px solid var(--line);}
table.gm{width:100%;border-collapse:collapse;min-width:880px;}
table.gm th{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;padding:13px 16px;text-align:right;white-space:nowrap;cursor:pointer;
  user-select:none;transition:.14s;}
table.gm th:first-child{text-align:left;}
table.gm th.nosort{cursor:default;}
table.gm th:hover:not(.nosort){color:var(--ink-dim);}
table.gm th .ar{opacity:.5;margin-left:4px;font-size:8px;}
table.gm th.sorted{color:var(--accent-bright);}
table.gm tbody tr{border-top:1px solid var(--line);transition:.14s;}
table.gm tbody tr:hover{background:var(--bg-2);}
table.gm td{padding:13px 16px;text-align:right;font-family:"JetBrains Mono",monospace;font-size:12px;
  color:var(--ink-dim);white-space:nowrap;}
table.gm td:first-child{text-align:left;}
.cname{font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:12.5px;color:var(--ink);
  max-width:300px;overflow:hidden;text-overflow:ellipsis;}
.cmeta{display:flex;align-items:center;gap:8px;margin-top:5px;}
.cat-badge{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;
  font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid;}
.share-cell{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.share-bar{width:54px;height:5px;border-radius:6px;background:var(--bg-3);overflow:hidden;}
.share-bar i{display:block;height:100%;background:var(--accent);border-radius:6px;}
.v-strong{color:var(--ink);font-weight:700;}
.v-em{color:var(--emerald);font-weight:700;}
.pager{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-top:1px solid var(--line);flex-wrap:wrap;gap:10px;}
.pager .info{font-size:11.5px;color:var(--ink-faint);font-weight:600;}
.pager .info b{color:var(--ink-dim);}
.pg-btns{display:flex;gap:5px;}
.pg-btn{min-width:32px;height:32px;padding:0 8px;border-radius:9px;border:1px solid var(--line);background:var(--bg-2);
  color:var(--ink-dim);font-size:12px;font-weight:700;transition:.14s;}
.pg-btn:hover:not(:disabled){color:var(--ink);border-color:var(--line-2);}
.pg-btn:disabled{opacity:.35;cursor:not-allowed;}
.pg-btn.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent-bright);}

/* ---------- footer ---------- */
.footer{margin-top:46px;border-top:1px solid var(--line);background:rgba(2,9,15,.6);}
.foot-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:34px;padding:42px 0 30px;}
.foot-h{font-family:"Marcellus",serif;font-size:14px;letter-spacing:.04em;color:var(--ink);margin:0 0 12px;}
.foot-brand{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.foot-mark{height:38px;width:auto;display:block;filter:drop-shadow(0 3px 10px rgba(207,138,0,.16));}
.foot-p{font-size:12px;color:var(--ink-dim);line-height:1.65;}
.foot-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}
.foot-list li{font-size:11.5px;color:var(--ink-dim);line-height:1.55;position:relative;padding-left:15px;}
.foot-list li::before{content:"›";color:var(--accent);font-weight:700;position:absolute;left:0;top:0;}
.foot-list b{color:var(--ink);}
.foot-bottom{border-top:1px solid var(--line);padding:18px 0;display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--ink-faint);font-weight:600;flex-wrap:wrap;gap:8px;}

.fade-in{animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- responsive ---------- */
@media(max-width:980px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .split{grid-template-columns:1fr;}
  .foot-grid{grid-template-columns:1fr;gap:24px;}
}
@media(max-width:560px){
  .wrap{padding:0 16px;}
  .kpi-grid{grid-template-columns:1fr;}
  .hero-row{flex-direction:column;align-items:flex-start;}
  .hero-stat{text-align:left;}
  .status-chip{display:none;}
}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#04101a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#04101a"/>
    <g transform="translate(600 360)">
      <path d="M -70 -150 L -70 -40 L 0 -10 L 70 -40 L 70 -150 L 35 -120 L 35 -150 L 0 -120 L -35 -150 L -35 -120 Z" fill="#CF8A00"/>
